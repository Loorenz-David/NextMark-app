<!-- ===== Email Wrapper ===== -->
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      role="presentation"
      style="width:100%; background-color:#f5f5f5;"
    >
      <tbody>
        <!-- TOP SPACER -->
        <tr>
          <td height="24" style="font-size:24px; line-height:24px;">
            &nbsp;
          </td>
        </tr>
        <tr>
          <td align="center">

            <!-- ===== Container (600px) ===== -->
            <table
              width="600"
              cellpadding="0"
              cellspacing="0"
              role="presentation"
              style="
                width:600px;
                max-width:600px;
                background-color:#ffffff;
                font-family:Arial, Helvetica, sans-serif;
                color:#111111;
              "
            >
              <tbody>
                <!-- ===== logo  ===== -->
                 <tr>
                  <td
                    style="
                      padding:32px; line-height:1.6; text-align:center;
                    "
                  >
                    <!-- SLATE: body -->
                        <img src="//beyovintage.se/cdn/shop/files/white_logo_Recovered.png?v=1728484083" 
                            alt="Company Logo" 
                            style="display:block; margin:0 auto; max-width:100%; height:100px;" 
                        />
                  </td>
                </tr>

                <!-- ===== Header Slot ===== -->
                <tr>
                  <td
                    style="
                        padding-top:24px;
                        padding-left:32px;
                        padding-right:32px; 
                        padding-bottom:10px;

                        font-size:24px;
                        font-weight:semi-bold;
                        color:#5a5a5a;
                    "
                  >
                    <!-- SLATE: header -->
                     {{HEADER_CONTENT}}
                  </td>
                </tr>

                <!-- ===== Body Slot ===== -->
                <tr>
                  <td
                    style="
                      padding:32px;
                      line-height:1.6;
                      font-size:15px;
                      border-bottom:1px solid #e5e5e5;
                    "
                  >
                    <!-- SLATE: body -->
                     {{BODY_CONTENT}}
                  </td>
                </tr>

                <!-- ===== Footer Slot ===== -->
                 <!-- SLATE: footer -->

                 <!-- Padding top  -->
                   <tr>
                        <td
                            style="
                                padding:10px 32px; line-height:1.6; text-align:center;
                            "
                        >
                           
                        </td>
                    </tr>
                <!-- --------------------- -->


                <tr>
                        <td
                            style="
                                padding:10px 32px; line-height:1.6; text-align:center;
                            "
                        >
                            {{FOOTER_BUTTONS}}
                           
                        </td>
                        
                         
                    </tr>
                    


                    <!-- Padding bottom footer  -->
                    <tr>
                        <td
                            style="
                                padding:10px 32px; line-height:1.6; text-align:center;
                            "
                        >
                           
                        </td>
                    </tr>
                    <!-- --------------------- -->
               
                
                

              </tbody>
            </table>
            <!-- ===== /Container ===== -->

          </td>
        </tr>

        <!-- BOTTOM SPACER -->
        <tr>
          <td height="24" style="font-size:24px; line-height:24px;">
            &nbsp;
          </td>
        </tr>

      </tbody>
    </table>
